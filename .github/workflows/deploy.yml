name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Only one prod deploy at a time.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write # for OIDC federation to AWS
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Wait for the CI gate (lint + typecheck + unit tests + e2e + build) on
    # the same SHA before shipping. If CI hasn't completed yet, this job
    # queues; if it fails, deploy fails too.
    needs: []

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @guitarserials/web build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # Two-pass sync so fingerprinted assets get a long immutable cache
      # while HTML / sitemap / robots get a short TTL that clears fast after
      # an invalidation. Pass 2 has --delete so removed files drop out of S3.
      - name: Sync fingerprinted assets (long cache)
        run: |
          aws s3 sync apps/web/dist/ "s3://${{ secrets.AWS_S3_BUCKET }}/" \
            --delete \
            --exclude "*" \
            --include "_astro/*" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync everything else (short cache, delete stale)
        run: |
          aws s3 sync apps/web/dist/ "s3://${{ secrets.AWS_S3_BUCKET }}/" \
            --delete \
            --exclude "_astro/*" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
